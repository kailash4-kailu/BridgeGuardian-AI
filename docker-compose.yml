version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: bridgeguardian-backend
    restart: always
    volumes:
      - static-data:/app/backend/static
      - model-data:/app/models
      - log-data:/app/logs
    env_file:
      - .env
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      # IMPORTANT: Keep at 1 for SQLite — increase only after migrating to PostgreSQL
      - GUNICORN_WORKERS=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: bridgeguardian-frontend
    restart: always
    volumes:
      - static-data:/app/backend/static:ro
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  static-data:
  model-data:
  log-data:
