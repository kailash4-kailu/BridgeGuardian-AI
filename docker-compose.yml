version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: bridgeguardian-backend
    restart: always
    volumes:
      - static-data:/app/backend/static
      - model-data:/app/models
      - log-data:/app/logs
    env_file:
      - .env
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: bridgeguardian-frontend
    restart: always
    volumes:
      - static-data:/app/backend/static:ro
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  static-data:
  model-data:
  log-data:
